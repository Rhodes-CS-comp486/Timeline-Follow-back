<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="app-shell">
        {% include 'partials/sidebar_nav.html' %}

            <header class="page-header">
                <h1>Account Settings</h1>
                <p class="subtitle">Manage your account information</p>
            </header>

            <main class="auth-wrapper">
                <div class="auth-card panel">
                    <h2 class="auth-title">Profile Information</h2>

                    <div class="form-group">
                        <label class="form-label" for="email">Email</label>
                        <input
                            type="email"
                            id="email"
                            class="form-input"
                            value="{{ current_user.email if current_user else '' }}"
                            readonly
                        >
                    </div>

                    <p class="form-hint">Contact your administrator to update your account information.</p>
                </div>
            </main>
        </div>
    <script src="{{ url_for('static', filename='js/navigation.js') }}"></script>
</body>
</html>
